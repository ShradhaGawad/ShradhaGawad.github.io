<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1 class="logo">Shradha Gawad</h1>
      <p class="tagline"></p>
      <nav>
        <ul>
          <li><a href="#about">About</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section id="about" class="about">
    <div class="container">
      <h2>About Me</h2>
      <p>Welcome to my World!</p>
    </div>
  </section>

  <section id="projects" class="projects">
    <h2>Projects</h2>
    <div class="container">
      <template id="project-card">
        <div class="project-card">
          <img src="[image]" alt="[project title]">
          <h3>Stock Market Analysis</h3>
          <p>Analyzed the stock market for tesla and predicted tomorrows stock price</p>
          <a href="[project url]" class="button">View Details</a>
        </div>
      </template>
      </div>
  </section>

  <section id="contact" class="contact">
    <div class="container">
      <h2>Get in Touch</h2>
      <p>Let's connect! Feel free to reach out to me for collaboration opportunities.</p>
      <ul class="contact-info">
        <li><a href="mailto:[your email]"><i class="fas fa-envelope"></i> [Your Email]</a></li>
        <li><a href="[your LinkedIn profile URL]"><i class="fab fa-linkedin"></i> LinkedIn</a></li>
      </ul>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>Thank you for visiting</p>
    </div>
  </footer>

  <script src="scripts.js"></script>
</body></html>
